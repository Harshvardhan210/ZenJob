services:
  # Backend FastAPI Service (ZenJob)
  - type: web
    name: zenjob-backend
    env: python
    region: ohio
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: "*" # Initially allow all, then update to your Vercel URL
      - key: PYTHON_VERSION
        value: 3.10.0
    disk:
      name: jobs-data-disk
      mountPath: /app/backend/uploads
      sizeGB: 1
