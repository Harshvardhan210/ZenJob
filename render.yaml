services:
  # Backend FastAPI Service (ZenJob)
  - type: web
    name: magiccounter-backend

    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    region: ohio

    plan: free
    repo: https://github.com/Harshvardhan210/MagicCounter # Make sure this matches your repo

    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false # This will prompt for the value in Render UI
      - key: ALLOWED_ORIGINS
        value: "https://magiccounter-frontend.onrender.com"
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: 8000




  # Frontend React Service (ZenJob UI)
  - type: web

    name: magiccounter-frontend

    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist

    envVars:
      - key: VITE_API_BASE_URL
        sync: false # This will prompt for the Render Backend URL

