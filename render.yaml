services:
  # Backend FastAPI Service
  - type: web
    name: job-collector-backend
    env: python
    region: ohio # Change to your preferred region
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set this in Render dashboard
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-domain.vercel.app # Update after frontend deploy
      - key: PYTHON_VERSION
        value: 3.10.0
    disk:
      name: uploads-data
      mountPath: /app/backend/uploads
      sizeGB: 1
