services:
  # Backend FastAPI Service (ZenJob)
  - type: web
    name: zenjob-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    region: ohio

    plan: free
    repo: https://github.com/Harshvardhan210/ZenJob # Make sure this matches your repo
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false # This will prompt for the value in Render UI
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: 8000

    disk:
      name: jobs-data-disk
      mountPath: /app/backend/uploads
      sizeGB: 1

  # Frontend React Service (ZenJob UI)
  - type: static
    name: zenjob-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # This will prompt for the Render Backend URL

